syntax = "proto3";

package shiroha.api.v1;

service FlowService {
  rpc DeployFlow(DeployFlowRequest) returns (DeployFlowResponse);
  rpc ListFlows(ListFlowsRequest) returns (ListFlowsResponse);
  rpc GetFlow(GetFlowRequest) returns (GetFlowResponse);
  rpc DeleteFlow(DeleteFlowRequest) returns (DeleteFlowResponse);
}

service JobService {
  rpc CreateJob(CreateJobRequest) returns (CreateJobResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc DeleteJob(DeleteJobRequest) returns (DeleteJobResponse);
  rpc TriggerEvent(TriggerEventRequest) returns (TriggerEventResponse);
  rpc PauseJob(PauseJobRequest) returns (PauseJobResponse);
  rpc ResumeJob(ResumeJobRequest) returns (ResumeJobResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc GetJobEvents(GetJobEventsRequest) returns (GetJobEventsResponse);
}

// === Flow ===

message DeployFlowRequest {
  string flow_id = 1;
  bytes wasm_bytes = 2;
}

message DeployFlowResponse {
  string flow_id = 1;
  string version = 2;
  repeated string warnings = 3;
}

message ListFlowsRequest {}

message ListFlowsResponse {
  repeated FlowSummary flows = 1;
}

message FlowSummary {
  string flow_id = 1;
  string version = 2;
  string initial_state = 3;
  uint32 state_count = 4;
}

message GetFlowRequest {
  string flow_id = 1;
}

message GetFlowResponse {
  string flow_id = 1;
  string version = 2;
  string manifest_json = 3;
}

message DeleteFlowRequest {
  string flow_id = 1;
}

message DeleteFlowResponse {
  string flow_id = 1;
}

// === Job ===

message CreateJobRequest {
  string flow_id = 1;
  optional bytes context = 2;
}

message CreateJobResponse {
  string job_id = 1;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  string job_id = 1;
  string flow_id = 2;
  string state = 3;
  string current_state = 4;
}

message ListJobsRequest {
  string flow_id = 1;
}

message ListJobsResponse {
  repeated GetJobResponse jobs = 1;
}

message DeleteJobRequest {
  string job_id = 1;
}

message DeleteJobResponse {
  string job_id = 1;
}

message TriggerEventRequest {
  string job_id = 1;
  string event = 2;
  optional bytes payload = 3;
}

message TriggerEventResponse {}

message PauseJobRequest {
  string job_id = 1;
}

message PauseJobResponse {}

message ResumeJobRequest {
  string job_id = 1;
}

message ResumeJobResponse {}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {}

message GetJobEventsRequest {
  string job_id = 1;
}

message GetJobEventsResponse {
  repeated EventRecord events = 1;
}

message EventRecord {
  string id = 1;
  string job_id = 2;
  uint64 timestamp_ms = 3;
  string kind_json = 4;
}
