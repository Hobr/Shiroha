[workspace]
members = [
    "app/sctl",
    "app/shirohad",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.94.1"
license = "GPL-3.0"
repository = "https://github.com/Hobr/Shiroha"

[workspace.dependencies]
# 异步运行时
tokio = { version = "1", features = ["full"] }

# WASM 运行时
wasmtime = { version = "43.0", features = ["trace-log"] }
wasmtime-wasi = { version = "43.0", features = ["p3"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI
clap = { version = "4.6", features = ["derive", "env", "string", "unicode"] }

# gRPC
tonic = { version = "0.14", features = ["gzip", "deflate", "zstd"] }
tonic-prost-build = "0.14"
prost = "0.14"
prost-types = "0.14"

# 存储
redb = "3.1"

# 配置管理
config = "0.15"

# 错误处理
thiserror = "2"
anyhow = "1.0"

# 信息
shadow-rs = { version = "1.7", features = ["cargo_metadata"] }
uuid = { version = "1.23", features = ["v7", "serde", "rng-rand"] }

[profile.release]
debug = false
lto = true
strip = true
opt-level = 3
codegen-units = 1
panic = "abort"
