[workspace]
members = [
    "app/sctl",
    "app/shirohad",

    "crate/shiroha-client",
    "crate/shiroha-core",
    "crate/shiroha-sdk",
    "crate/shiroha-wit",
    "crate/shiroha-engine",
    "crate/shiroha-proto",
    "crate/shiroha-store-redb",
    "crate/shiroha-wasm",
]
resolver = "3"

[workspace.package]
version = "0.1.2"
edition = "2024"
rust-version = "1.94.1"
license = "GPL-3.0-only"
repository = "https://github.com/Hobr/Shiroha"

[workspace.dependencies]
# 内部
shiroha-core = { path = "crate/shiroha-core" }
shiroha-client = { path = "crate/shiroha-client" }
shiroha-engine = { path = "crate/shiroha-engine" }
shiroha-proto = { path = "crate/shiroha-proto" }
shiroha-store-redb = { path = "crate/shiroha-store-redb" }
shiroha-wasm = { path = "crate/shiroha-wasm" }
shiroha-sdk = { path = "crate/shiroha-sdk" }
shiroha-wit = { path = "crate/shiroha-wit" }

# 异步运行时
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["time"] }
tokio-stream = { version = "0.1", features = ["net"] }

# WASM 运行时
wasmtime = { version = "43.0", features = ["trace-log"] }
wasmtime-wasi = { version = "43.0", features = ["p3"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 日志与追踪
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# CLI
clap = { version = "4.6", features = ["derive", "env", "string", "unicode"] }
clap_complete = { version = "4.6", features = ["unstable-dynamic"] }

# gRPC
tonic = { version = "0.14", features = ["gzip", "deflate", "zstd"] }
tonic-prost-build = "0.14"
prost = "0.14"
prost-types = "0.14"
tower = "0.5"
hyper-util = { version = "0.1", features = ["tokio"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "brotli", "cookies", "deflate", "gzip", "http2", "rustls-tls-native-roots", "socks", "zstd"] }

# 存储
redb = "4.0"
fs2 = "0.4"

# 配置管理
config = "0.15"

# 错误处理
thiserror = "2.0"
anyhow = "1.0"
sha2 = "0.10"

# 信息
shadow-rs = { version = "1.7", features = ["cargo_metadata"] }
uuid = { version = "1.23", features = ["v7", "serde", "rng-rand"] }

[profile.release]
debug = false
lto = true
strip = true
opt-level = 3
codegen-units = 1
panic = "abort"
